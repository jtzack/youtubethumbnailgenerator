/* ═══════════════════════════════════════════
   DRAWING HELPERS
   ═══════════════════════════════════════════ */

function wrapText(ctx, text, maxWidth) {
  const words = text.split(" ");
  const lines = [];
  let current = "";
  for (const word of words) {
    const test = current ? current + " " + word : word;
    if (ctx.measureText(test).width > maxWidth && current) {
      lines.push(current);
      current = word;
    } else { current = test; }
  }
  if (current) lines.push(current);
  return lines;
}

function fitText(ctx, text, maxWidth, maxLines, startSize, minSize, fontWeight, fontFamily) {
  const ff = fontFamily || "'Oswald', sans-serif";
  let size = startSize;
  while (size >= minSize) {
    ctx.font = `${fontWeight} ${size}px ${ff}`;
    const lines = wrapText(ctx, text, maxWidth);
    if (lines.length <= maxLines) return { fontSize: size, lines, lineHeight: size * 1.12 };
    size -= 2;
  }
  ctx.font = `${fontWeight} ${minSize}px ${ff}`;
  const lines = wrapText(ctx, text, maxWidth);
  return { fontSize: minSize, lines: lines.slice(0, maxLines), lineHeight: minSize * 1.12 };
}

function applyTextEffect(ctx, text, x, y, fillColor, outlineStyle, outlineColor, accentColor) {
  const style = outlineStyle || "none";
  ctx.save();
  switch (style) {
    case "outline":
      ctx.strokeStyle = outlineColor || "#000";
      ctx.lineWidth = 8;
      ctx.lineJoin = "round";
      ctx.miterLimit = 2;
      ctx.strokeText(text, x, y);
      break;
    case "thick":
      ctx.strokeStyle = outlineColor || "#000";
      ctx.lineWidth = 16;
      ctx.lineJoin = "round";
      ctx.miterLimit = 2;
      ctx.strokeText(text, x, y);
      break;
    case "shadow":
      ctx.shadowColor = "rgba(0,0,0,0.7)";
      ctx.shadowBlur = 12;
      ctx.shadowOffsetX = 5;
      ctx.shadowOffsetY = 5;
      break;
    case "glow":
      ctx.shadowColor = accentColor || "#FF0000";
      ctx.shadowBlur = 20;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;
      // Draw twice for stronger glow
      ctx.fillStyle = fillColor;
      ctx.fillText(text, x, y);
      break;
    case "block": {
      const offX = 6, offY = 6;
      ctx.fillStyle = outlineColor || "#000";
      for (let i = offY; i > 0; i--) {
        ctx.fillText(text, x + (offX * i / offY), y + i);
      }
      break;
    }
  }
  ctx.fillStyle = fillColor;
  ctx.fillText(text, x, y);
  ctx.restore();
}

function drawFittedLines(ctx, lines, x, startY, lineHeight, fillColor, outlineStyle, outlineColor, accentColor, align) {
  ctx.textAlign = align || "left";
  ctx.textBaseline = "top";
  lines.forEach((line, i) => {
    applyTextEffect(ctx, line, x, startY + i * lineHeight, fillColor, outlineStyle, outlineColor, accentColor);
  });
  ctx.textAlign = "left";
  ctx.textBaseline = "alphabetic";
}

function drawBadge(ctx, text, x, y, bgColor, textColor, fontSize) {
  const fs = fontSize || 22;
  ctx.font = `bold ${fs}px 'Inter', sans-serif`;
  const m = ctx.measureText(text);
  const px = 16, py = 8;
  const bw = m.width + px * 2, bh = fs + py * 2;
  ctx.fillStyle = bgColor;
  ctx.beginPath();
  ctx.roundRect(x, y, bw, bh, bh / 2);
  ctx.fill();
  ctx.fillStyle = textColor;
  ctx.textBaseline = "middle";
  ctx.textAlign = "left";
  ctx.fillText(text, x + px, y + bh / 2);
  ctx.textBaseline = "alphabetic";
  return { w: bw, h: bh };
}

function drawLogo(ctx, img, x, y, size) {
  if (!img) return;
  const a = img.width / img.height;
  let dw = size, dh = size;
  if (a > 1) dh = size / a; else dw = size * a;
  ctx.drawImage(img, x + (size - dw) / 2, y + (size - dh) / 2, dw, dh);
}



function drawPerson(ctx, img, zoneX, zoneY, zoneW, zoneH, scale, offX, offY, clip) {
  if (!img) return;
  const s = scale / 100;
  const aspect = img.width / img.height;
  let dh = zoneH * s;
  let dw = dh * aspect;
  // Bottom-aligned, centered in zone
  let dx = zoneX + (zoneW - dw) / 2 + offX;
  let dy = zoneY + (zoneH - dh) + offY;

  if (clip) {
    ctx.save();
    if (clip.type === "circle") {
      ctx.beginPath();
      ctx.arc(clip.cx, clip.cy, clip.r, 0, Math.PI * 2);
      ctx.clip();
    }
  }
  ctx.drawImage(img, dx, dy, dw, dh);
  if (clip) ctx.restore();
}

function drawBgImage(ctx, img, opacity) {
  if (!img) return;
  const imgA = img.width / img.height, canA = W / H;
  let sx, sy, sw, sh;
  if (imgA > canA) { sh = img.height; sw = img.height * canA; sx = (img.width - sw) / 2; sy = 0; }
  else { sw = img.width; sh = img.width / canA; sx = 0; sy = (img.height - sh) / 2; }
  ctx.drawImage(img, sx, sy, sw, sh, 0, 0, W, H);
  if (opacity > 0) { ctx.fillStyle = `rgba(0,0,0,${opacity / 100})`; ctx.fillRect(0, 0, W, H); }
}

/* Luminance-based contrast helper: picks text color that reads well on a given surface */
function contrastText(surfaceHex, preferred, fallback) {
  const lum = h => { const r = parseInt(h.slice(1,3),16), g = parseInt(h.slice(3,5),16), b = parseInt(h.slice(5,7),16); return (0.299*r + 0.587*g + 0.114*b) / 255; };
  return Math.abs(lum(surfaceHex) - lum(preferred.slice(0,7))) > 0.3 ? preferred : fallback;
}

function drawThumbnail(ctx, templateId, inputs) {
  const {
    title, subtitle, badge, bgColor, accentColor, textColor, outlineColor,
    logo, bgImage, personImg, showTitle, showSubtitle, showBadge,
    showLogo, showPerson, fontId, outlineStyle, personScale, personOffsetX, personOffsetY, overlayOpacity,
    logoSize
  } = inputs;

  const titleText = (title || "YOUR TITLE HERE").toUpperCase();
  const subText = subtitle || "Your subtitle goes here";
  const badgeText = (badge || "NEW").toUpperCase();
  const fontObj = FONTS.find(f => f.id === fontId) || FONTS[0];
  const ff = fontObj.family;
  const fw = fontObj.weight;
  const oStyle = outlineStyle || "none";
  const oColor = outlineColor || bgColor;
  const hasBg = !!bgImage;
  const textOnBg = contrastText(bgColor, textColor, accentColor);
  const textOnAccent = contrastText(accentColor, textColor, bgColor);

  ctx.clearRect(0, 0, W, H);

  switch (templateId) {

    /* ──── BOLD SPLIT ──── */
    case "bold-split": {
      const splitX = Math.round(W * 0.55);
      if (hasBg) { drawBgImage(ctx, bgImage, overlayOpacity); }
      else {
        ctx.fillStyle = accentColor; ctx.fillRect(0, 0, splitX, H);
        ctx.fillStyle = bgColor; ctx.fillRect(splitX, 0, W - splitX, H);
      }
      if (showPerson && personImg) drawPerson(ctx, personImg, splitX, 0, W - splitX, H, personScale, personOffsetX, personOffsetY);
      if (showLogo && logo) drawLogo(ctx, logo, W - logoSize - 30, H - logoSize - 30, logoSize);
      const bsText = hasBg ? textColor : textOnAccent;
      let textY = 60;
      if (showBadge) {
        const bd = drawBadge(ctx, badgeText, 46, textY, hasBg ? accentColor : bgColor, hasBg ? textColor : textOnBg, 20);
        textY += bd.h + 20;
      }
      if (showTitle) {
        const fit = fitText(ctx, titleText, splitX - 90, 3, 96, 48, fw, ff);
        ctx.font = `${fw} ${fit.fontSize}px ${ff}`;
        drawFittedLines(ctx, fit.lines, 46, textY, fit.lineHeight, bsText, oStyle, oColor, accentColor, "left");
        textY += fit.lines.length * fit.lineHeight + 12;
      }
      if (showSubtitle) {
        const fit = fitText(ctx, subText, splitX - 90, 2, 36, 22, "500", ff);
        ctx.font = `500 ${fit.fontSize}px ${ff}`;
        drawFittedLines(ctx, fit.lines, 46, textY, fit.lineHeight, bsText + "CC", oStyle, oColor, accentColor, "left");
      }
      break;
    }

    /* ──── GRADIENT SWEEP ──── */
    case "gradient-sweep": {
      if (hasBg) { drawBgImage(ctx, bgImage, overlayOpacity); }
      else {
        const grad = ctx.createLinearGradient(0, 0, W, 0);
        grad.addColorStop(0, bgColor); grad.addColorStop(1, accentColor);
        ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
      }
      if (showPerson && personImg) drawPerson(ctx, personImg, W * 0.5, 0, W * 0.5, H, personScale, personOffsetX, personOffsetY);
      if (showLogo && logo) drawLogo(ctx, logo, W - logoSize - 30, H - logoSize - 30, logoSize);
      let ty = H * 0.25;
      if (showBadge) {
        const bd = drawBadge(ctx, badgeText, 50, ty, accentColor, hasBg ? textColor : textOnAccent, 20);
        ty += bd.h + 18;
      }
      if (showTitle) {
        const fit = fitText(ctx, titleText, W * 0.45, 3, 90, 44, fw, ff);
        ctx.font = `${fw} ${fit.fontSize}px ${ff}`;
        drawFittedLines(ctx, fit.lines, 50, ty, fit.lineHeight, hasBg ? textColor : textOnBg, oStyle, oColor, accentColor, "left");
        ty += fit.lines.length * fit.lineHeight + 10;
      }
      if (showSubtitle) {
        const fit = fitText(ctx, subText, W * 0.45, 2, 34, 20, "500", ff);
        ctx.font = `500 ${fit.fontSize}px ${ff}`;
        drawFittedLines(ctx, fit.lines, 50, ty, fit.lineHeight, (hasBg ? textColor : textOnBg) + "BB", oStyle, oColor, accentColor, "left");
      }
      break;
    }

    /* ──── DIAGONAL SLASH ──── */
    case "diagonal-slash": {
      if (hasBg) { drawBgImage(ctx, bgImage, overlayOpacity); }
      else {
        ctx.fillStyle = bgColor; ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = accentColor;
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(W, 0); ctx.lineTo(W, H * 0.6); ctx.lineTo(0, H); ctx.closePath(); ctx.fill();
      }
      if (showPerson && personImg) drawPerson(ctx, personImg, W * 0.5, 0, W * 0.5, H, personScale, personOffsetX, personOffsetY);
      if (showLogo && logo) drawLogo(ctx, logo, W - logoSize - 30, H - logoSize - 30, logoSize);
      const dsText = hasBg ? textColor : textOnAccent;
      let ty = H * 0.35;
      if (showBadge) {
        const bd = drawBadge(ctx, badgeText, 50, ty, hasBg ? accentColor : bgColor, hasBg ? textColor : textOnBg, 20);
        ty += bd.h + 16;
      }
      if (showTitle) {
        const fit = fitText(ctx, titleText, W * 0.46, 3, 80, 38, fw, ff);
        ctx.font = `${fw} ${fit.fontSize}px ${ff}`;
        drawFittedLines(ctx, fit.lines, 50, ty, fit.lineHeight, dsText, oStyle, oColor, accentColor, "left");
        ty += fit.lines.length * fit.lineHeight + 10;
      }
      if (showSubtitle) {
        // Clamp subtitle so it doesn't go past canvas bottom
        const maxSubY = H - 50;
        if (ty < maxSubY) {
          const fit = fitText(ctx, subText, W * 0.46, 1, 30, 18, "500", ff);
          ctx.font = `500 ${fit.fontSize}px ${ff}`;
          drawFittedLines(ctx, fit.lines, 50, ty, fit.lineHeight, dsText + "CC", oStyle, oColor, accentColor, "left");
        }
      }
      break;
    }

    /* ──── SPOTLIGHT ──── */
    case "spotlight": {
      if (hasBg) { drawBgImage(ctx, bgImage, overlayOpacity); }
      else {
        ctx.fillStyle = bgColor; ctx.fillRect(0, 0, W, H);
        const glow = ctx.createRadialGradient(W / 2, H * 0.85, 20, W / 2, H * 0.85, H * 0.8);
        glow.addColorStop(0, accentColor + "66"); glow.addColorStop(0.5, accentColor + "22"); glow.addColorStop(1, "transparent");
        ctx.fillStyle = glow; ctx.fillRect(0, 0, W, H);
      }
      if (showPerson && personImg) drawPerson(ctx, personImg, W * 0.2, 0, W * 0.6, H, personScale, personOffsetX, personOffsetY);
      if (showLogo && logo) drawLogo(ctx, logo, W - logoSize - 30, H - logoSize - 30, logoSize);
      let spY = 30;
      if (showBadge) {
        // Pre-measure badge width to center it
        ctx.font = `bold 22px 'Inter', sans-serif`;
        const badgeW = ctx.measureText(badgeText).width + 32;
        const bd = drawBadge(ctx, badgeText, W / 2 - badgeW / 2, spY, accentColor, hasBg ? textColor : textOnAccent, 22);
        spY += bd.h + 16;
      }
      if (showTitle) {
        const fit = fitText(ctx, titleText, W * 0.8, 2, 100, 50, fw, ff);
        ctx.font = `${fw} ${fit.fontSize}px ${ff}`;
        drawFittedLines(ctx, fit.lines, W / 2, spY, fit.lineHeight, hasBg ? textColor : textOnBg, oStyle, oColor, accentColor, "center");
        spY += fit.lines.length * fit.lineHeight + 10;
      }
      if (showSubtitle) {
        const fit = fitText(ctx, subText, W * 0.7, 2, 30, 20, "500", ff);
        ctx.font = `500 ${fit.fontSize}px ${ff}`;
        drawFittedLines(ctx, fit.lines, W / 2, spY, fit.lineHeight, (hasBg ? textColor : textOnBg) + "CC", oStyle, oColor, accentColor, "center");
      }
      break;
    }

    /* ──── FULL BLEED ──── */
    case "full-bleed": {
      if (hasBg) { drawBgImage(ctx, bgImage, overlayOpacity); }
      else { ctx.fillStyle = bgColor; ctx.fillRect(0, 0, W, H); }
      if (showPerson && personImg) drawPerson(ctx, personImg, W * 0.3, 0, W * 0.7, H, personScale, personOffsetX, personOffsetY);
      // Darken left for text readability
      const leftGrad = ctx.createLinearGradient(0, 0, W * 0.6, 0);
      leftGrad.addColorStop(0, bgColor + "EE"); leftGrad.addColorStop(0.6, bgColor + "88"); leftGrad.addColorStop(1, "transparent");
      ctx.fillStyle = leftGrad; ctx.fillRect(0, 0, W * 0.65, H);
      if (showLogo && logo) drawLogo(ctx, logo, W - logoSize - 30, H - logoSize - 30, logoSize);
      let ty = H * 0.2;
      if (showBadge) {
        const bd = drawBadge(ctx, badgeText, 46, ty, accentColor, hasBg ? textColor : textOnAccent, 22);
        ty += bd.h + 20;
      }
      if (showTitle) {
        const fit = fitText(ctx, titleText, W * 0.44, 3, 96, 46, fw, ff);
        ctx.font = `${fw} ${fit.fontSize}px ${ff}`;
        drawFittedLines(ctx, fit.lines, 46, ty, fit.lineHeight, hasBg ? textColor : textOnBg, oStyle, oColor, accentColor, "left");
        ty += fit.lines.length * fit.lineHeight + 12;
      }
      if (showSubtitle) {
        const fit = fitText(ctx, subText, W * 0.4, 2, 34, 20, "500", ff);
        ctx.font = `500 ${fit.fontSize}px ${ff}`;
        drawFittedLines(ctx, fit.lines, 46, ty, fit.lineHeight, (hasBg ? textColor : textOnBg) + "CC", oStyle, oColor, accentColor, "left");
      }
      break;
    }

    /* ──── MINIMAL CLEAN ──── */
    case "minimal-clean": {
      if (hasBg) { drawBgImage(ctx, bgImage, overlayOpacity); }
      else { ctx.fillStyle = bgColor; ctx.fillRect(0, 0, W, H); }
      if (showPerson && personImg) drawPerson(ctx, personImg, W * 0.55, H * 0.1, W * 0.45, H * 0.9, personScale, personOffsetX, personOffsetY);
      if (showLogo && logo) drawLogo(ctx, logo, W - logoSize - 30, H - logoSize - 30, logoSize);
      let ty = 80;
      if (showBadge) {
        const bd = drawBadge(ctx, badgeText, 50, ty, accentColor, textOnAccent, 20);
        ty += bd.h + 24;
      }
      if (showTitle) {
        const fit = fitText(ctx, titleText, W * 0.5, 3, 100, 50, fw, ff);
        ctx.font = `${fw} ${fit.fontSize}px ${ff}`;
        drawFittedLines(ctx, fit.lines, 50, ty, fit.lineHeight, textColor, oStyle, oColor, accentColor, "left");
        ty += fit.lines.length * fit.lineHeight;
        // Accent underline
        ctx.fillStyle = accentColor;
        ctx.fillRect(50, ty + 6, 80, 6);
        ty += 28;
      }
      if (showSubtitle) {
        const fit = fitText(ctx, subText, W * 0.48, 2, 34, 20, "500", ff);
        ctx.font = `500 ${fit.fontSize}px ${ff}`;
        drawFittedLines(ctx, fit.lines, 50, ty, fit.lineHeight, textColor + "BB", oStyle, oColor, accentColor, "left");
      }
      break;
    }

    /* ──── BANNER BAR ──── */
    case "banner-bar": {
      if (hasBg) { drawBgImage(ctx, bgImage, overlayOpacity); }
      else { ctx.fillStyle = bgColor; ctx.fillRect(0, 0, W, H); }
      // Draw bar — size it to fit title content
      const barPad = 24;
      let barTitleFit = null;
      if (showTitle) {
        barTitleFit = fitText(ctx, titleText, W * 0.55, 2, 60, 32, fw, ff);
      }
      const barContentH = barTitleFit ? barTitleFit.lines.length * barTitleFit.lineHeight : 60;
      const barH = barContentH + barPad * 2;
      const barY = (H - barH) / 2;
      ctx.fillStyle = accentColor; ctx.fillRect(0, barY, W, barH);
      if (showPerson && personImg) drawPerson(ctx, personImg, W * 0.6, 0, W * 0.4, H, personScale, personOffsetX, personOffsetY);
      if (showLogo && logo) drawLogo(ctx, logo, W - logoSize - 30, H - logoSize - 30, logoSize);
      const barTextColor = hasBg ? textColor : textOnAccent;
      if (showTitle && barTitleFit) {
        ctx.font = `${fw} ${barTitleFit.fontSize}px ${ff}`;
        const titleY = barY + barPad;
        drawFittedLines(ctx, barTitleFit.lines, 50, titleY, barTitleFit.lineHeight, barTextColor, oStyle, oColor, accentColor, "left");
      }
      if (showSubtitle) {
        const subFit = fitText(ctx, subText, W * 0.55, 1, 28, 18, "500", ff);
        ctx.font = `500 ${subFit.fontSize}px ${ff}`;
        drawFittedLines(ctx, subFit.lines, 50, barY - subFit.lineHeight - 10, subFit.lineHeight, (hasBg ? textColor : textOnBg) + "99", oStyle, oColor, accentColor, "left");
      }
      if (showBadge) drawBadge(ctx, badgeText, 50, barY + barH + 18, accentColor, hasBg ? textColor : textOnAccent, 20);
      break;
    }

    /* ──── CIRCLE FRAME ──── */
    case "circle-frame": {
      if (hasBg) { drawBgImage(ctx, bgImage, overlayOpacity); }
      else { ctx.fillStyle = bgColor; ctx.fillRect(0, 0, W, H); }
      const cx = W * 0.32, cy = H * 0.5, radius = 220;
      // Circle border
      ctx.strokeStyle = accentColor; ctx.lineWidth = 8;
      ctx.beginPath(); ctx.arc(cx, cy, radius + 4, 0, Math.PI * 2); ctx.stroke();
      // Dark fill behind person
      ctx.fillStyle = bgColor + "CC";
      ctx.beginPath(); ctx.arc(cx, cy, radius, 0, Math.PI * 2); ctx.fill();
      if (showPerson && personImg) {
        drawPerson(ctx, personImg, cx - radius, cy - radius, radius * 2, radius * 2, personScale, personOffsetX, personOffsetY, { type: "circle", cx, cy, r: radius });
      }
      if (showLogo && logo) drawLogo(ctx, logo, W - logoSize - 30, H - logoSize - 30, logoSize);
      let ty = H * 0.18;
      if (showBadge) {
        const bd = drawBadge(ctx, badgeText, W * 0.58, ty, accentColor, hasBg ? textColor : textOnAccent, 20);
        ty += bd.h + 18;
      }
      if (showTitle) {
        const fit = fitText(ctx, titleText, W * 0.38, 3, 80, 40, fw, ff);
        ctx.font = `${fw} ${fit.fontSize}px ${ff}`;
        drawFittedLines(ctx, fit.lines, W * 0.58, ty, fit.lineHeight, hasBg ? textColor : textOnBg, oStyle, oColor, accentColor, "left");
        ty += fit.lines.length * fit.lineHeight + 10;
      }
      if (showSubtitle) {
        const fit = fitText(ctx, subText, W * 0.36, 2, 32, 20, "500", ff);
        ctx.font = `500 ${fit.fontSize}px ${ff}`;
        drawFittedLines(ctx, fit.lines, W * 0.58, ty, fit.lineHeight, (hasBg ? textColor : textOnBg) + "BB", oStyle, oColor, accentColor, "left");
      }
      break;
    }
  }
}

/* ═══════════════════════════════════════════
   UI COMPONENTS
   ═══════════════════════════════════════════ */

const sidebarLabel = { fontSize: 11, fontWeight: 600, color: "#888", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 6 };
const fieldInput = { width: "100%", background: "#1a1a1a", border: "1px solid #333", borderRadius: 8, padding: "10px 12px", color: "#fff", fontSize: 14, fontFamily: "Inter, sans-serif" };
const toggleBtn = (active) => ({
  flex: 1, padding: "8px 0", borderRadius: 8, border: "1px solid " + (active ? "#FF0000" : "#333"),
  background: active ? "#FF0000" : "transparent", color: active ? "#fff" : "#999",
  cursor: "pointer", fontSize: 13, fontWeight: 600, fontFamily: "Inter, sans-serif", transition: "all 0.15s",
});

function Field({ label, value, onChange, placeholder, rows }) {
  return (
    <div style={{ marginBottom: 14 }}>
      <div style={sidebarLabel}>{label}</div>
      {rows ? (
        <textarea style={{ ...fieldInput, resize: "vertical", minHeight: 56 }} rows={rows} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} />
      ) : (
        <input style={fieldInput} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} />
      )}
    </div>
  );
}

function Toggle({ label, value, onChange }) {
  return (
    <label style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer", marginBottom: 8 }}>
      <div onClick={() => onChange(!value)} style={{
        width: 36, height: 20, borderRadius: 10, background: value ? "#FF0000" : "#333",
        position: "relative", transition: "background 0.2s", cursor: "pointer",
      }}>
        <div style={{
          width: 16, height: 16, borderRadius: "50%", background: "#fff",
          position: "absolute", top: 2, left: value ? 18 : 2, transition: "left 0.2s",
        }} />
      </div>
      <span style={{ fontSize: 13, color: "#ccc" }}>{label}</span>
    </label>
  );
}

function ImageUpload({ label, onLoad, hasImage, onClear }) {
  const ref = useRef();
  return (
    <div style={{ marginBottom: 14 }}>
      <div style={sidebarLabel}>{label}</div>
      <div style={{ display: "flex", gap: 8 }}>
        <button onClick={() => ref.current.click()} style={{
          flex: 1, padding: "10px 0", borderRadius: 8, border: "1px solid #333",
          background: "#1a1a1a", color: "#ccc", cursor: "pointer", fontSize: 13, fontFamily: "Inter, sans-serif",
        }}>
          {hasImage ? "✓ Replace" : "Upload"}
        </button>
        {hasImage && (
          <button onClick={onClear} style={{
            padding: "10px 14px", borderRadius: 8, border: "1px solid #333",
            background: "#1a1a1a", color: "#FF6B6B", cursor: "pointer", fontSize: 13, fontFamily: "Inter, sans-serif",
          }}>✕</button>
        )}
      </div>
      <input ref={ref} type="file" accept="image/*" style={{ display: "none" }} onChange={e => {
        const f = e.target.files[0]; if (!f) return;
        const img = new Image();
        img.onload = () => onLoad(img, f);
        img.src = URL.createObjectURL(f);
      }} />
    </div>
  );
}

function ColorField({ label, value, onChange }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
      <input type="color" value={value} onChange={e => onChange(e.target.value)} style={{ width: 32, height: 32, border: "none", borderRadius: 6, cursor: "pointer", background: "transparent" }} />
      <span style={{ fontSize: 12, color: "#999" }}>{label}</span>
      <input style={{ ...fieldInput, width: 80, padding: "6px 8px", fontSize: 12, marginLeft: "auto" }} value={value} onChange={e => onChange(e.target.value)} />
    </div>
  );
}

function Slider({ label, value, onChange, min, max, suffix }) {
  return (
    <div style={{ marginBottom: 10 }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
        <span style={{ fontSize: 11, color: "#888" }}>{label}</span>
        <span style={{ fontSize: 11, color: "#666" }}>{value}{suffix || ""}</span>
      </div>
      <input type="range" min={min} max={max} value={value} onChange={e => onChange(Number(e.target.value))} style={{ width: "100%", accentColor: "#FF0000" }} />
    </div>
  );
}

function TemplatesTab() {
  const canvasRef = useRef();
  const [template, setTemplate] = useState("bold-split");
  const [inputs, setInputs] = useState({ ...DEFAULT_INPUTS });

  const update = (key, val) => setInputs(prev => ({ ...prev, [key]: val }));

  // Draw
  useEffect(() => {
    const c = canvasRef.current; if (!c) return;
    c.width = W; c.height = H;
    const ctx = c.getContext("2d");

    // Explicitly load the selected font, then draw
    const fontObj = FONTS.find(f => f.id === inputs.fontId) || FONTS[0];
    const fontSpec = `${fontObj.weight} 48px ${fontObj.family}`;
    document.fonts.load(fontSpec).then(() => {
      drawThumbnail(ctx, template, inputs);
    }).catch(() => {
      drawThumbnail(ctx, template, inputs);
    });
  }, [template, inputs]);

  const handleExport = () => {
    const c = canvasRef.current; if (!c) return;
    const link = document.createElement("a");
    link.download = `thumbnail-${template}.png`;
    link.href = c.toDataURL("image/png");
    link.click();
  };



  return (
    <div style={{ display: "flex", height: "calc(100vh - 64px)", overflow: "hidden" }}>
      {/* Sidebar */}
      <div style={{ width: 310, minWidth: 310, background: "#0a0a0a", borderRight: "1px solid #222", overflowY: "auto", padding: 20 }}>

            const isActive = template === t.id;
            const SvgComp = TEMPLATE_SVG_MAP[t.id];
            return (
              <div key={t.id} onClick={() => setTemplate(t.id)} style={{
                border: `2px solid ${isActive ? "#FF0000" : "#333"}`, borderRadius: 10,
                overflow: "hidden", cursor: "pointer", background: "#141414", transition: "border-color 0.15s",

                <div style={{ aspectRatio: "16/9", overflow: "hidden" }}>{SvgComp && <SvgComp />}</div>
                <div style={{ padding: "6px 8px", fontSize: 11, fontWeight: 600, color: isActive ? "#FF0000" : "#999", textAlign: "center" }}>{t.label}</div>
              </div>
            );
          })}
        </div>

        {/* Colors */}
        <div style={sidebarLabel}>Colors</div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 12 }}>
          {PALETTES.map(p => (
            <div key={p.label} onClick={() => { update("bgColor", p.bg); update("accentColor", p.accent); update("textColor", p.text); }}

        <ColorField label="Text" value={inputs.textColor} onChange={v => update("textColor", v)} />

        <div style={{ height: 1, background: "#222", margin: "16px 0" }} />

        {/* Text Fields */}
        <div style={sidebarLabel}>Text</div>
        <div style={{ display: "flex", gap: 6, marginBottom: 10 }}>
          <Toggle label="Title" value={inputs.showTitle} onChange={v => update("showTitle", v)} />
          <Toggle label="Subtitle" value={inputs.showSubtitle} onChange={v => update("showSubtitle", v)} />
          <Toggle label="Badge" value={inputs.showBadge} onChange={v => update("showBadge", v)} />
        </div>

        {inputs.showSubtitle && <Field label="Subtitle" value={inputs.subtitle} onChange={v => update("subtitle", v)} placeholder="Your subtitle goes here" />}

        {inputs.showPerson && (

        {/* Logo */}
        <Toggle label="Show Logo" value={inputs.showLogo} onChange={v => update("showLogo", v)} />
        {inputs.showLogo && (
          <>
          <ImageUpload label="Logo" hasImage={!!inputs.logo}
            onLoad={(img) => update("logo", img)}
            onClear={() => update("logo", null)}
          />
          <div style={{ marginTop: 10 }}>
            <div style={sidebarLabel}>Logo Size: {inputs.logoSize}px</div>
            <input type="range" min="24" max="120" value={inputs.logoSize} onChange={e => update("logoSize", +e.target.value)}
              style={{ width: "100%", accentColor: inputs.accentColor }} />
          </div>
          </>
        )}

        {/* Background Image */}
        <div style={{ height: 1, background: "#222", margin: "16px 0" }} />
        <ImageUpload label="Background Image (optional)" hasImage={!!inputs.bgImage}
          onLoad={(img) => update("bgImage", img)}
          onClear={() => update("bgImage", null)}
        />
        {inputs.bgImage && (
          <Slider label="Overlay Darkness" value={inputs.overlayOpacity} onChange={v => update("overlayOpacity", v)} min={0} max={80} suffix="%" />
        )}
      </div>

      {/* Preview + Export */}
      <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 30, overflow: "auto" }}>
        <div style={{ position: "relative", width: "100%", maxWidth: 820, marginBottom: 20 }}>
          <canvas ref={canvasRef} style={{ width: "100%", borderRadius: 12, boxShadow: "0 8px 40px rgba(0,0,0,0.5)" }} />
          <div style={{ position: "absolute", top: 12, right: 12, background: "#000A", borderRadius: 6, padding: "4px 10px", fontSize: 11, color: "#888" }}>
            1280 × 720
          </div>
        </div>
        <button onClick={handleExport} style={{
          padding: "14px 48px", borderRadius: 10, border: "none",
          background: "#FF0000", color: "#fff", fontSize: 16, fontWeight: 700,
          cursor: "pointer", fontFamily: "Inter, sans-serif", letterSpacing: "0.02em",
        }}>
          Download PNG
        </button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   AI BACKGROUNDS TAB
   ═══════════════════════════════════════════ */

function AIBackgroundsTab() {
  const [topic, setTopic] = useState("");
  const [selectedStyle, setSelectedStyle] = useState("cinematic");
  const [selectedTool, setSelectedTool] = useState("midjourney");
  const [complexity, setComplexity] = useState("clean");
  const [brandBg, setBrandBg] = useState("#1a1a1a");
  const [brandAccent, setBrandAccent] = useState("#FF0000");
  const [iconToggle, setIconToggle] = useState(false);
  const [iconPlacement, setIconPlacement] = useState("center");
  const [prompt, setPrompt] = useState("");
  const [copied, setCopied] = useState(false);

  useEffect(() => {
    const s = BG_STYLES.find(st => st.id === selectedStyle);
    const t = AI_TOOLS.find(tl => tl.id === selectedTool);
    if (!s || !t) return;

    const stylePrompt = complexity === "rich" ? (s.richPrompt || s.prompt) : s.prompt;
    const topicLine = topic ? `\nTOPIC CONTEXT: Background for a YouTube thumbnail about "${topic}". Adapt the mood and color palette to match this subject.` : "";
    const colorLine = `\nBRAND COLORS: Use ${brandAccent} as the primary accent color and ${brandBg} as the base/dark tone. The background should feel cohesive with these colors.`;

    const placementMap = { "center": "centered in the frame", "left": "positioned on the left side", "right": "positioned on the right side", "top-left": "positioned in the top-left area", "top-right": "positioned in the top-right area", "bottom-left": "positioned in the bottom-left area", "bottom-right": "positioned in the bottom-right area" };
    const iconLine = (iconToggle && topic)
      ? `\nICON: Include a simple, bold, flat icon or symbol that represents "${topic}" — ${placementMap[iconPlacement] || "centered"}. The icon should be a clean silhouette, easy to read at small sizes. Style the icon to match the overall background aesthetic.`
      : (iconToggle && !topic)
      ? `\nICON: Include a simple, bold, flat icon or symbol — ${placementMap[iconPlacement] || "centered"}. The icon should be a clean silhouette, easy to read at small sizes. Style the icon to match the overall background aesthetic.`
      : "";

    const rules = complexity === "rich"
      ? `\nRULES:\n- No people, no faces, no figures\n- No text, no words, no letters, no typography\n- Rich, intentional composition — fill the frame with visual interest\n- Leave a natural focal area where a person will be composited\n- 16:9 aspect ratio, 1280×720px\n- High quality, production-ready`
      : `\nRULES:\n- No people, no faces, no figures\n- No text, no words, no letters, no typography\n- Simple composition with generous negative space\n- Clean, uncluttered — leave room for a person and text to be composited on top\n- 16:9 aspect ratio, 1280×720px`;

    const full = `STYLE: ${s.name} — ${stylePrompt}${topicLine}${iconLine}${colorLine}${rules}${t.suffix}`;
    setPrompt(full);
  }, [topic, selectedStyle, selectedTool, complexity, brandBg, brandAccent, iconToggle, iconPlacement]);

  const handleCopy = () => {
    navigator.clipboard.writeText(prompt);
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };

  return (
    <div style={{ display: "flex", height: "calc(100vh - 64px)", overflow: "hidden" }}>
      {/* Sidebar */}
      <div style={{ width: 310, minWidth: 310, background: "#0a0a0a", borderRight: "1px solid #222", overflowY: "auto", padding: 20 }}>

        {/* Step 1: Topic */}
        <div style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: "#FF0000", marginBottom: 8 }}>Step 1 — Video Topic</div>
          <Field label="What's the video about?" value={topic} onChange={setTopic} placeholder="e.g. How I gained 10K subscribers" />
        </div>

        {/* Brand Colors */}
        <div style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: "#FF0000", marginBottom: 8 }}>Brand Colors</div>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 10 }}>
            {PALETTES.map(p => (
              <div key={p.label} onClick={() => { setBrandBg(p.bg); setBrandAccent(p.accent); }}
                title={p.label} style={{
                  width: 28, height: 28, borderRadius: 6, cursor: "pointer",
                  background: `linear-gradient(135deg, ${p.bg} 50%, ${p.accent} 50%)`,
                  border: `2px solid ${brandAccent === p.accent && brandBg === p.bg ? "#FF0000" : "#333"}`,
                }} />
            ))}
          </div>
          <ColorField label="Background" value={brandBg} onChange={setBrandBg} />
          <ColorField label="Accent" value={brandAccent} onChange={setBrandAccent} />
          <div style={{ fontSize: 11, color: "#666", marginTop: 4 }}>These colors are injected into the prompt so your AI background matches your brand.</div>
        </div>

        {/* Step 2: Style */}
        <div style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: "#FF0000", marginBottom: 8 }}>Step 2 — Background Style</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {BG_STYLES.map(s => {
              const isActive = selectedStyle === s.id;
              return (
                <div key={s.id} onClick={() => setSelectedStyle(s.id)} style={{
                  padding: "10px 14px", borderRadius: 8, cursor: "pointer",
                  border: `1px solid ${isActive ? "#FF0000" : "#2a2a2a"}`,
                  background: isActive ? "#FF000015" : "#141414", transition: "all 0.15s",
                }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: isActive ? "#FF0000" : "#ddd" }}>{s.name}</div>
                  <div style={{ fontSize: 11, color: "#888", marginTop: 2 }}>{s.desc}</div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Icon Options — works with any background style */}
        <div style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: "#FF0000", marginBottom: 8 }}>Icon</div>
          <Toggle label="Add Icon to Background" value={iconToggle} onChange={setIconToggle} />
          {iconToggle && (
            <>
              <div style={{ ...sidebarLabel, marginTop: 8 }}>Placement</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 4, marginBottom: 6 }}>
                {[
                  { id: "top-left", label: "Top L" }, { id: "center", label: "Center" }, { id: "top-right", label: "Top R" },
                  { id: "left", label: "Left" }, { id: "right", label: "Right" }, { id: "bottom-left", label: "Bot L" },
                  { id: "bottom-right", label: "Bot R" },
                ].map(p => (
                  <button key={p.id} onClick={() => setIconPlacement(p.id)} style={{
                    padding: "6px 4px", borderRadius: 6, fontSize: 11, fontWeight: 600,
                    border: `1px solid ${iconPlacement === p.id ? "#FF0000" : "#333"}`,
                    background: iconPlacement === p.id ? "#FF000020" : "transparent",
                    color: iconPlacement === p.id ? "#FF0000" : "#999",
                    cursor: "pointer", fontFamily: "Inter, sans-serif",
                  }}>{p.label}</button>
                ))}
              </div>
              <div style={{ fontSize: 11, color: "#666", marginTop: 4 }}>
                {topic ? `Icon will represent: "${topic}"` : "Enter a topic above to get a topic-specific icon"}
              </div>
            </>
          )}
        </div>

        {/* Step 3: Complexity */}
        <div style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: "#FF0000", marginBottom: 8 }}>Step 3 — Complexity</div>
          <div style={{ display: "flex", gap: 6 }}>
            <button onClick={() => setComplexity("clean")} style={toggleBtn(complexity === "clean")}>Clean</button>
            <button onClick={() => setComplexity("rich")} style={toggleBtn(complexity === "rich")}>Rich</button>
          </div>
          <div style={{ fontSize: 11, color: "#666", marginTop: 6 }}>
            {complexity === "clean" ? "Minimal background with space for text + person overlay" : "Visually rich background — more detail, fills the frame"}
          </div>
        </div>

        {/* Step 4: AI Tool */}
        <div style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: "#FF0000", marginBottom: 8 }}>Step 4 — AI Tool</div>
          <div style={{ display: "flex", gap: 6 }}>
            {AI_TOOLS.map(t => (
              <button key={t.id} onClick={() => setSelectedTool(t.id)} style={toggleBtn(selectedTool === t.id)}>{t.name}</button>
            ))}
          </div>
        </div>
      </div>

      {/* Prompt Output */}
      <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: 40, overflow: "auto" }}>
        <div style={{ maxWidth: 700 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: "#FF0000", marginBottom: 12 }}>Your Prompt</div>
          <div className="prompt-box">{prompt}</div>
          <div style={{ marginTop: 16, display: "flex", gap: 10 }}>
            <button onClick={handleCopy} style={{
              padding: "12px 32px", borderRadius: 10, border: "none",
              background: copied ? "#22c55e" : "#FF0000", color: "#fff", fontSize: 14, fontWeight: 700,
              cursor: "pointer", fontFamily: "Inter, sans-serif", transition: "background 0.2s",
            }}>
              {copied ? "Copied!" : "Copy Prompt"}
            </button>
          </div>

          <div style={{ marginTop: 40, padding: 20, background: "#141414", borderRadius: 12, border: "1px solid #2a2a2a" }}>
            <div style={{ fontSize: 14, fontWeight: 700, color: "#ddd", marginBottom: 10 }}>Workflow</div>
            <div style={{ fontSize: 13, color: "#999", lineHeight: 1.8 }}>
              1. Copy the prompt above<br />
              2. Paste into {AI_TOOLS.find(t => t.id === selectedTool)?.name || "your AI tool"} and generate the image<br />
              3. Download the result<br />
              4. Switch to the <strong style={{ color: "#ccc" }}>Templates</strong> tab<br />
              5. Upload it as a <strong style={{ color: "#ccc" }}>Background Image</strong><br />
              6. Add your person, text, and logo on top<br />
              7. Export your finished thumbnail
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   APP
   ═══════════════════════════════════════════ */

function App() {
  const [tab, setTab] = useState("templates");

  const tabStyle = (id) => ({
    padding: "10px 28px", cursor: "pointer", fontSize: 14, fontWeight: 600,
    color: tab === id ? "#fff" : "#888", borderBottom: tab === id ? "2px solid #FF0000" : "2px solid transparent",
    background: "transparent", border: "none", borderBottom: tab === id ? "2px solid #FF0000" : "2px solid transparent",
    fontFamily: "Inter, sans-serif", transition: "all 0.15s",
  });

  return (
    <div>
      <div style={{
        display: "flex", alignItems: "center", borderBottom: "1px solid #222",
        background: "#0a0a0a", padding: "0 20px", height: 64,
      }}>
        <div style={{ fontSize: 18, fontWeight: 800, color: "#fff", marginRight: 40 }}>
          <span style={{ color: "#FF0000" }}>YT</span> Thumbnail Generator
        </div>
        <button style={tabStyle("templates")} onClick={() => setTab("templates")}>Templates</button>
        <button style={tabStyle("ai")} onClick={() => setTab("ai")}>AI Backgrounds</button>
      </div>
      {tab === "templates" ? <TemplatesTab /> : <AIBackgroundsTab />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
